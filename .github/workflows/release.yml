name: Build & Release

# Build installable binaries and publish a GitHub Release on every push to main.
# Also runnable on demand from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping releases racing for the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

jobs:
  # ---- Gate: typecheck before we spend build minutes ----
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # ---- Android: prebuild + Gradle -> APK (signed with the debug key) ----
  android:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android
      - name: Stage APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/release/*.apk out/byok-gemini-agent.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: out/byok-gemini-agent.apk
          if-no-files-found: error

  # ---- Publish a GitHub Release with the APK attached ----
  # iOS is intentionally dropped for now: a real installable IPA needs Apple
  # signing, and the unsigned archive isn't useful to install. Re-add a `macos`
  # job later (note: use `ls -d ios/*.xcworkspace` — the .xcworkspace is a
  # directory, so plain `ls` lists its contents, not the bundle path).
  release:
    needs: [android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Build v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: |
            dist/byok-gemini-agent.apk
